<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Git Graph Comparison Report</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
{{CSS}}
    </style>
</head>
<body>
    <div class="container">
        <h1>Git Comparison Report</h1>
        
        <div class="legend">
            <div class="legend-item"><div class="color-box severity-IDENTICAL"></div> Identical</div>
            <div class="legend-item"><div class="color-box severity-MODIFIED"></div> Modified</div>
            <div class="legend-item"><div class="color-box severity-EXTRA"></div> Extra / Unmatched</div>
            <div class="legend-item"><div class="color-box severity-MOVABLE"></div> Movable</div>
        </div>

        <div class="graphs-wrapper">
            <div class="graph-container">
                <div class="graph-header">Student Graph <span id="student-count"></span></div>
                <div id="student-network" class="network"></div>
            </div>
            <div class="graph-container">
                <div class="graph-header">Reference Graph <span id="reference-count"></span></div>
                <div id="reference-network" class="network"></div>
            </div>
        </div>

        <div id="details" class="details-panel">
            <h3>Commit Details</h3>
            <p>Select a node to see details</p>
        </div>
    </div>

    <script type="text/javascript">
{{JS}}
    </script>
</body>
</html>
